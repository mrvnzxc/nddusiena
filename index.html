<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NDDSU AR Navigation</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050711;
        --panel: #111827;
        --accent: #3b82f6;
        --accent-soft: rgba(59, 130, 246, 0.12);
        --text: #e5e7eb;
        --muted: #9ca3af;
        --danger: #f97373;
        --success: #22c55e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: radial-gradient(circle at top, #1f2937 0, var(--bg) 55%);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        padding: 1rem 1.25rem 0.5rem;
      }

      h1 {
        font-size: 1.15rem;
        margin: 0;
      }

      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 0 1.25rem 1.25rem;
        gap: 0.75rem;
      }

      .card {
        background: linear-gradient(
          to bottom right,
          rgba(15, 23, 42, 0.96),
          rgba(15, 23, 42, 0.9)
        );
        border-radius: 1rem;
        border: 1px solid rgba(148, 163, 184, 0.25);
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.6);
        padding: 0.9rem 1rem;
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        align-items: center;
      }

      select,
      button {
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.5);
        padding: 0.5rem 0.9rem;
        font-size: 0.9rem;
        background: rgba(15, 23, 42, 0.85);
        color: var(--text);
      }

      select {
        min-width: 150px;
      }

      button {
        cursor: pointer;
        border-color: rgba(59, 130, 246, 0.7);
        background: radial-gradient(circle at top left, #2563eb, #1d4ed8);
        color: white;
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
      }

      button[disabled] {
        opacity: 0.5;
        cursor: default;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        border-radius: 999px;
        padding: 0.25rem 0.7rem;
        font-size: 0.75rem;
        background: rgba(15, 23, 42, 0.95);
        border: 1px solid rgba(148, 163, 184, 0.4);
        color: var(--muted);
      }

      .status {
        font-size: 0.8rem;
        color: var(--muted);
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 0.5rem;
      }

      .status strong {
        color: var(--text);
      }

      .status .ok {
        color: var(--success);
      }

      .status .err {
        color: var(--danger);
      }

      .arrow-container {
        margin-top: 0.25rem;
        flex: 1;
        min-height: 260px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #arrow {
        width: 0;
        height: 0;
        border-left: 32px solid transparent;
        border-right: 32px solid transparent;
        border-bottom: 80px solid var(--accent);
        filter: drop-shadow(0 0 16px rgba(59, 130, 246, 0.7));
        transform-origin: 50% 70%;
        transition: transform 0.08s linear;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
        margin-top: 0.4rem;
      }

      .chip {
        font-size: 0.7rem;
        border-radius: 999px;
        padding: 0.15rem 0.55rem;
        background: rgba(15, 23, 42, 0.96);
        border: 1px solid rgba(148, 163, 184, 0.3);
        color: var(--muted);
      }

      footer {
        font-size: 0.7rem;
        color: var(--muted);
        padding: 0 1.25rem 0.9rem;
      }

      @media (min-width: 768px) {
        main {
          max-width: 680px;
          margin: 0 auto 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>NDDSU AR Navigation</h1>
    </header>
    <main>
      <section class="card">
        <div class="row">
          <label for="destination-select">Destination</label>
          <select id="destination-select">
            <option value="">Select destination…</option>
            <option value="Finance">Finance</option>
            <option value="Registrar">Registrar</option>
            <option value="Clinic">Clinic</option>
          </select>

          <button id="start-nav-btn" disabled>
            Start navigation
          </button>
        </div>
        <div class="status" id="status-text">
          <span class="pill">Waiting for Supabase…</span>
        </div>
        <div class="chips" id="path-preview"></div>
      </section>

      <section class="card arrow-section">
        <div class="row" style="justify-content: space-between">
          <div class="pill">
            <span>Arrow → next checkpoint only</span>
          </div>
          <div class="pill" id="checkpoint-label">No route active</div>
        </div>
        <div class="arrow-container">
          <div id="arrow"></div>
        </div>
      </section>
    </main>
    <footer>
      Notre Dame Siena College - AR Navigation
    </footer>

    <!-- Supabase client -->
    <script src="https://unpkg.com/@supabase/supabase-js@2.48.0/dist/umd/supabase.min.js"></script>

    <!-- Main navigation logic -->
    <script src="./navigation_app.js"></script>
  </body>
</html>
